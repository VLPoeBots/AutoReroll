<!DOCTYPE html>
<html lang="en">
  <head>
    <script type="module" src="logic.js" defer></script>

    <meta
      http-equiv="Content-Security-Policy"
      content="
      default-src 'self';
      script-src 'self';
      style-src 'self';
      img-src 'self' data:;
      font-src 'self';
      connect-src 'self';
      object-src 'none';
      base-uri 'none';
    "
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
      <div id="Main">
        <div id="MyProjects" class="InitiallyHidden">My Projects</div>
    
      <div id="Gallery" hidden></div>
      <div class="InitiallyHidden" id="InputDiv">
        <input
          class="Input"
          type="text"
          id="ExcludeModInput"
          placeholder="Exclude mods that contain"
        />
        <input
          class="Input"
          type="text"
          id="ModInput"
          placeholder="Mod youre looking for"
        />
        <input
          class="Input"
          type="number"
          id="MaxRerolls"
          step="20"
          min="1"
          placeholder="Maximum rerolls"
        />
      </div>

      <div id="CurrencyDiv">
        <div id="ImageContainer">
          <div id="ManualContainer"></div>
          <div id="AutoContainer" class="Auto" > </div>
          <div id="TabContainer" > </div>
          
          <div  id="EssenceContainer">
            <div id="LeftEssence"></div>
            <div id="RightEssence"></div>
          </div>
          </div>
        </div>

 
      <button id="StoreCoordsButton" class="button">Store coordinates</button>
      <div id="Insertion"></div>

      <div id="Container" class="InitiallyHidden">Mods to look for:</div>
      <div id="ExclusionContainer" class="InitiallyHidden">
        Exclude mods that contain:
      </div>
      <div id="HideInstructions" class="InitiallyHidden">
        <button id="CraftingOptionsLabel" class="button">Crafting Options</button>
        <div id="CraftingOptions" class="CraftingOptionsClass Hidden">
         

        <div id="Fractures">
          <input type="checkbox" id="FractureCheckBox" class="CheckBox" />
          <label>Ignore fractures</label>
        </div>
        <div id="LagContainer">
          <input type="checkbox" id="LagCheckBox" class="CheckBox" />
          <label>Reroll delay</label>
          <input
            type="number"
            step="0.1"
            min="0"
            max="2"
            class="Input"
            id="LagInput"
          />
        </div>
        <div id="Repeats">
          <!-- <input class="CheckBox" type="checkbox" /> -->
          <label >Find minimum of</label>
          <input
            value="1"
            min="1"
            max="6"
            class="Input"
            id="ModNumber"
            type="number"
          />
          <label >of mods</label>
        </div>
        <label id="MapOptionsLabel">Map Only Options: </label>
         <div id="MapOptions" >
            <input type="checkbox" id="WisdomScrollCheckBox" class="CheckBox" />
            <label >WisdomScroll</label>
            <input type="checkbox" id="ScourCheckBox" class="CheckBox" />
            <label >ScourOrb</label>
            <input type="checkbox" id="VaalCheckBox" class="CheckBox" />
            <label >VaalOrb</label>
          </div>
      </div>

      </div>
      <div id="Start" class="InitiallyHidden">
        <button id="StartButton" class="button">Start crafting</button>
        <button id="SaveCraftButton" class="button">Save craft</button>
      </div>
    </div>
  </div>  
</body>
</html>
